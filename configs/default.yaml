# Default MOLT training configuration
# Gemma 3-1B, layer 13, N=1

model_name: google/gemma-3-1b-it
layer_idx: 13
d_model: 1152

# MOLT architecture
rank_multiplier: 1  # N=1 → 31 transforms total
activation: jumprelu
jumprelu_threshold: 0.0

# Training
sparsity_coeff: 1.0e-3
sparsity_warmup_frac: 0.1  # linearly ramp λ over first 10% of training
lr: 1.0e-3
batch_size: 64
num_tokens: 10_000_000
seq_len: 256
num_epochs: 1
seed: 42
device: cuda

# Data
dataset_name: HuggingFaceFW/fineweb
dataset_split: train
streaming: true

# Logging
wandb_project: repro-molts
wandb_enabled: false
log_every: 100
eval_every: 1000

# Checkpointing
save_dir: checkpoints
